name: Refresh Grand Slam Calendar

on:
  push:
    branches: [master]
    paths: [generate_calendar.py]
  schedule:
    - cron: '0 8 1 1 *'    # Jan 1 — new year's events active
    - cron: '0 8 1 10 *'   # Oct 1 — when next year's official schedules drop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate ICS
        run: python generate_calendar.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.ics
          if ! git diff --staged --quiet; then
            git commit -m "Refresh calendar.ics [$(date -u +%Y-%m-%d)]"
            git push
          else
            echo "No changes to commit"
          fi
